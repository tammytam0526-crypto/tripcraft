<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>TripCraft — 旅行規劃</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TripCraft">
<meta name="theme-color" content="#12293F">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ink:#16324F;--ink2:#3D5A75;--paper:#FBF8F1;--card:#FFFFFF;--line:#E7DFCF;--red:#E24A34;--matcha:#6E8B57;--gold:#C98A28;--navy:#12293F;--plum:#B0568C;--blue:#2E6DA4;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
*{box-sizing:border-box;margin:0}html,body{padding:0}
body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,0)}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
.wrap{max-width:430px;margin:0 auto;padding:0 16px}
/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:15px;padding:12px 24px;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}
.btn-dark{background:var(--ink);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-gold{background:var(--gold);color:#fff}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:9px}
.btn-google{background:#fff;color:#333;border:1.5px solid #ddd;font-weight:600;font-size:14px;padding:12px 28px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
input,select,textarea{font-family:inherit;font-size:15px;border:1.5px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);padding:11px 14px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ink);outline-offset:-1px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:6px}
/* ---- landing ---- */
#landing{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
#dashboard{display:none;min-height:100vh;padding-bottom:40px}
#wizard{display:none;min-height:100vh}
#generating{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
#tripview{display:none;padding-bottom:96px}
.land-top{background:linear-gradient(145deg,#12293F 0%,#1A3A5C 50%,#243B53 100%);color:#fff;padding:16px 22px 28px;text-align:center;position:relative;overflow:hidden;border-radius:0 0 24px 24px}
.land-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.land-brand{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:#9BB4CC}
.land-brand span{color:var(--gold)}
.lang-btn{cursor:pointer;background:rgba(255,255,255,.12);color:#C9D8E6;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 10px;font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:1px}
.land-hero h1{font-size:26px;font-weight:900;line-height:1.3;letter-spacing:-0.5px}
.land-hero p{font-size:13.5px;color:#B0C4D8;margin-top:10px;line-height:1.7}
.land-body{flex:1;padding:20px 20px 0}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:24px;box-shadow:0 4px 20px rgba(22,50,79,.06)}
.auth-tabs{display:flex;margin-bottom:18px;background:var(--paper);border-radius:12px;padding:3px}
.auth-tab{flex:1;border:none;background:none;padding:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;border-radius:10px;color:var(--ink2);transition:all .15s}
.auth-tab.on{background:var(--ink);color:#fff;box-shadow:0 2px 8px rgba(22,50,79,.15)}
.auth-form .field{margin-bottom:12px}
.auth-form .field label{font-size:12.5px;margin-bottom:5px}
.auth-form input{border-radius:12px;padding:13px 14px;font-size:16px}
.land-features{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.lf{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.lf-i{font-size:24px;flex:0 0 auto;margin-top:2px}
.lf b{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.lf p{font-size:12.5px;color:var(--ink2);line-height:1.5;margin:0}
.footer{text-align:center;padding:16px 20px 32px;font-size:11px;color:#9AA6AF}
/* ---- dashboard ---- */
.dash-head{background:var(--navy);color:#fff;padding:20px;display:flex;justify-content:space-between;align-items:center}
.dash-head .logo{font-weight:900;font-size:18px;letter-spacing:-0.5px}.dash-head .logo span{color:var(--gold)}
.dash-user{display:flex;align-items:center;gap:10px;font-size:13px}
.dash-user img{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3)}
.dash-user button{background:rgba(255,255,255,.15);color:#C9D8E6;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit}
.trip-grid{display:grid;gap:16px;margin-top:20px}
.trip-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:box-shadow .15s}
.trip-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.trip-card .tc-top{display:flex;justify-content:space-between;align-items:flex-start}
.trip-card .tc-dest{font-size:11px;color:var(--red);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.trip-card h3{font-size:18px;font-weight:800;margin-top:4px}
.trip-card .tc-meta{display:flex;gap:14px;margin-top:10px;font-size:12.5px;color:var(--ink2)}
.trip-card .tc-meta span{display:flex;align-items:center;gap:4px}
.trip-card .tc-actions{display:flex;gap:8px;margin-top:14px}
.create-card{background:transparent;border:2px dashed var(--line);border-radius:16px;padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--ink2);font-weight:700;font-size:15px;transition:border-color .15s}
.create-card:hover{border-color:var(--red);color:var(--red)}
.create-card .cc-icon{font-size:32px}
/* ---- wizard ---- */

.wiz-head{background:var(–navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.wiz-head .back{cursor:pointer;font-size:20px;background:none;border:none;color:#C9D8E6;padding:4px}
.wiz-head h2{font-size:17px;font-weight:800}
.wiz-progress{height:4px;background:#1F3B56;margin-bottom:24px}.wiz-progress>div{height:100%;background:var(–red);border-radius:2px;transition:width .3s}
.wiz-body{padding:0 20px;max-width:520px;margin:0 auto}
.wiz-q{font-size:20px;font-weight:800;margin-bottom:6px}
.wiz-sub{font-size:13.5px;color:var(–ink2);margin-bottom:20px;line-height:1.5}
.wiz-opts{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.wiz-opt{cursor:pointer;padding:12px 18px;border:1.5px solid var(–line);border-radius:12px;font-weight:600;font-size:14px;background:var(–card);transition:all .15s}
.wiz-opt:hover{border-color:var(–ink)}
.wiz-opt.on{background:var(–ink);color:#fff;border-color:var(–ink)}
.wiz-nav{display:flex;gap:12px;margin-top:30px;padding-bottom:40px}
.mode-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.mode-card{cursor:pointer;background:var(–card);border:2px solid var(–line);border-radius:16px;padding:20px;text-align:center;transition:all .15s}
.mode-card:hover,.mode-card:active{border-color:var(–ink);transform:scale(.98)}
.mc-icon{font-size:36px;margin-bottom:8px}.mc-title{font-weight:800;font-size:16px}.mc-desc{font-size:13px;color:var(–ink2);margin-top:4px}
.hotel-entry{background:var(–card);border:1px solid var(–line);border-radius:12px;padding:14px;margin-bottom:12px}
.hotel-entry .row{display:flex;gap:8px}.hotel-entry input{font-size:13px;padding:9px 10px}
/* –– generating –– */
.gen-spinner{width:60px;height:60px;border:4px solid var(–line);border-top-color:var(–red);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-text{font-size:18px;font-weight:700}.gen-sub{font-size:14px;color:var(–ink2);margin-top:8px;line-height:1.6}
.gen-steps{margin-top:24px;text-align:left;max-width:340px}
.gen-step{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13.5px;color:var(–ink2)}
.gen-step.done{color:var(–matcha);font-weight:600}
.gen-step .gs-icon{width:24px;text-align:center;font-size:16px}
/* –– trip view (reuses most styles from original app) –– */
.tv-head{background:var(–navy);color:#fff;padding:14px 16px}
.tv-head .tv-top{display:flex;justify-content:space-between;align-items:flex-start}
.tv-head .back{cursor:pointer;font-size:18px;background:none;border:none;color:#C9D8E6;padding:4px;margin-right:8px}
.tv-head .tv-title{font-size:20px;font-weight:800;margin-top:2px}
.tv-head .tv-meta{display:flex;gap:12px;margin-top:8px;font-family:var(–mono);font-size:11px;color:#C9D8E6;flex-wrap:wrap}
.tv-share{display:flex;align-items:center;gap:6px;margin-top:10px}
.tv-share input{flex:1;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px}
.tv-share button{background:var(–gold);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
nav.tabs{display:flex;position:sticky;top:0;z-index:30;background:var(–card);border-bottom:1px solid var(–line);box-shadow:0 1px 6px rgba(0,0,0,.05)}
nav.tabs button{flex:1;border:none;background:none;padding:9px 0 7px;cursor:pointer;border-bottom:3px solid transparent;color:#9AA6AF;font-weight:500;font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
nav.tabs button .ic{font-size:17px;line-height:1}
nav.tabs button.on{color:var(–ink);font-weight:800;border-bottom-color:var(–red)}
.tv-main{padding:16px 14px;max-width:680px;margin:0 auto}
section{display:none}section.on{display:block}
/* timeline styles */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.chip{flex:0 0 auto;cursor:pointer;padding:8px 12px;border-radius:12px;border:1px solid var(–line);background:var(–card);color:var(–ink2);text-align:center;min-width:64px}
.chip .d{font-family:var(–mono);font-weight:800;font-size:15px}.chip .w{font-size:10.5px;opacity:.8;margin-top:2px}
.chip.on{background:var(–ink);color:#fff;border-color:var(–ink)}
.dayhead{background:var(–ink);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.dayhead .k{font-family:var(–mono);font-size:12px;color:#9BB4CC;letter-spacing:1px}.dayhead .c{font-size:19px;font-weight:800;margin-top:3px}
.dayhead .tag{background:var(–red);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
.transit{background:#EEF3F7;border:1px solid #DCE6EE;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:12.5px;color:var(–ink2);line-height:1.5}
.navall{width:100%;cursor:pointer;background:var(–matcha);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:700;font-size:13px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;margin-bottom:12px}
.item{display:flex;gap:11px}
.tcol{flex:0 0 44px;text-align:right;padding-top:2px}.tcol .tt{font-family:var(–mono);font-size:12px;font-weight:700}
.nodecol{display:flex;flex-direction:column;align-items:center}
.node{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;box-shadow:0 2px 5px rgba(0,0,0,.12);flex:0 0 auto}
.vline{flex:1;width:2px;background:var(–line);margin-top:2px;min-height:14px}
.card{flex:1;background:var(–card);border:1px solid var(–line);border-radius:12px;padding:11px 13px;margin-bottom:14px;min-width:0}
.card .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.card .ti{font-weight:700;font-size:14.5px;line-height:1.35}
.badge{flex:0 0 auto;font-size:10.5px;border-radius:6px;padding:1px 6px;font-weight:600}
.info{display:inline-flex;gap:10px;margin-top:8px;font-size:11.5px;color:var(–ink2);background:#F3F0E8;border-radius:7px;padding:5px 9px;flex-wrap:wrap}
.intro{margin:8px 0 0;font-size:13px;color:var(–ink2);line-height:1.65}
.rec{background:#FFF8EC;border:1px solid #F0E2C4;border-radius:10px;padding:10px 12px;margin-top:9px}
.rec .rn{font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rstar{font-family:var(–mono);color:#fff;background:var(–gold);border-radius:5px;padding:1px 6px;font-size:11px;font-weight:700}
.rec .rmeta{font-size:11.5px;color:#9A7B3F;margin-top:4px;line-height:1.5}
.alts{margin-top:8px;border-top:1px dashed #EAD9B4;padding-top:7px}
.alts .al{font-size:11px;color:#9A7B3F;margin-bottom:4px;font-weight:700}
.altlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;text-decoration:none;color:var(–ink);background:#fff;border:1px solid #E7DFCF;border-radius:7px;padding:4px 8px;margin:0 6px 6px 0;font-weight:600}
.altlink .s{font-family:var(–mono);color:var(–gold);font-size:10.5px}
.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.mapbtn,.dirbtn{display:inline-flex;align-items:center;gap:5px;font-size:12px;text-decoration:none;padding:5px 10px;border-radius:8px;font-weight:600}
.mapbtn{color:#fff;background:var(–ink)}.dirbtn{color:#fff;background:var(–matcha)}
.recgo{display:inline-flex;align-items:center;gap:5px;font-size:12px;text-decoration:none;padding:5px 10px;border-radius:8px;font-weight:600;color:#fff;background:var(–gold);margin-top:8px}
/* shared panel styles */
.hero-box{background:var(–ink);color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.hero-box .lbl{font-size:12px;color:#9BB4CC;letter-spacing:1px}
.hero-box .big{font-family:var(–mono);font-size:30px;font-weight:800;margin-top:2px}
.hero-box .sub{font-family:var(–mono);font-size:14px;color:var(–gold);margin-top:2px}
.panel{background:var(–card);border:1px solid var(–line);border-radius:14px;padding:14px;margin-bottom:16px}
.panel h3{margin:0 0 10px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.row{display:flex;gap:8px}
.catrow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.catbtn{cursor:pointer;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:20px;border:1px solid var(–line);background:var(–card);color:var(–ink2)}
.addbtn{cursor:pointer;background:var(–red);color:#fff;border:none;border-radius:9px;padding:0 18px;font-weight:700;font-size:14px}
.exp{display:flex;align-items:center;gap:10px;background:var(–card);border:1px solid var(–line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.del{cursor:pointer;border:none;background:none;color:#C9B8B8;font-size:16px;padding:2px 4px}
.empty{text-align:center;color:#9AA6AF;font-size:13px;padding:22px 0;border:1px dashed var(–line);border-radius:12px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qcell{background:var(–card);border:1px solid var(–line);border-radius:11px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.qcell .j{font-family:var(–mono);font-weight:700;font-size:14px}.qcell .h{font-family:var(–mono);color:var(–gold);font-weight:700;font-size:13px}
.bkcat{margin-bottom:16px}.bkcat .bh{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;margin-bottom:9px}
.bkcat .bh .ic,.phase .ph .ic{width:26px;height:26px;border-radius:8px;background:var(–ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.bk{display:flex;align-items:center;gap:10px;background:var(–card);border:1px solid var(–line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.bk .nm{flex:1;font-size:13.5px;font-weight:600;min-width:0}.bk .nm small{display:block;color:#9AA6AF;font-weight:400;font-size:11px;margin-top:2px}
.bk .go{flex:0 0 auto;font-size:12px;color:#fff;background:var(–ink);text-decoration:none;padding:5px 10px;border-radius:8px;font-weight:600}
.prog{height:8px;background:#1F3B56;border-radius:20px;margin-top:10px;overflow:hidden}.prog>div{height:100%;background:var(–matcha);border-radius:20px;transition:width .3s}
.phase{margin-bottom:18px}.phase .ph{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;margin-bottom:9px}
.chk{display:flex;align-items:center;gap:10px;background:var(–card);border:1px solid var(–line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.chk .box{cursor:pointer;flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:1.5px solid #CBD2C4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.chk .lab{flex:1;font-size:13.5px;color:var(–ink);font-weight:600}.chk.on .box{background:var(–matcha);border-color:var(–matcha)}.chk.on .lab{color:#8A9A7C;text-decoration:line-through;font-weight:500}
.chk .mini{cursor:pointer;border:none;background:none;font-size:14px;padding:2px 3px;color:#B7BCC2}
.phrase{display:flex;justify-content:space-between;gap:8px;background:var(–card);border:1px solid var(–line);border-radius:9px;padding:9px 11px;margin-bottom:7px;font-size:13px}
.phrase .jp{font-weight:700;color:var(–ink);text-align:right}
.emc{background:var(–card);border:1px solid var(–line);border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.6}
.emc b{color:var(–red)}
.note{font-size:11.5px;color:#9AA6AF;text-align:center;margin-top:6px;line-height:1.6}
.notebox{background:#FFFDF6;border:1px dashed var(–gold);border-radius:10px;padding:8px 10px;margin-bottom:14px}
.notebox .nl{font-size:11px;color:var(–gold);font-weight:700;margin-bottom:4px}
.notebox textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(–ink);resize:vertical;min-height:34px}
.gen-error{background:#FEF2F0;border:1px solid #F5D5CF;border-radius:12px;padding:16px;margin:20px;text-align:center}
.gen-error h3{color:var(–red);font-size:16px;margin-bottom:8px}
.gen-error p{font-size:13px;color:var(–ink2);line-height:1.5}
</style>

</head>
<body>

<!-- ===== LANDING ===== -->

<div id="landing">
  <div class="land-top">
    <div class="land-topbar"><div class="land-brand">Trip<span>Craft</span></div><button class="lang-btn" id="landLang" onclick="cycleLang()">EN</button></div>
    <div class="land-hero">
      <h1>規劃你的<br>完美旅行</h1>
      <p>輸入目的地，自動生成行程——<br>餐廳推薦、導航、記帳、分享給旅伴。</p>
    </div>
  </div>
  <div class="land-body">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab on" data-mode="login">登入</button>
        <button class="auth-tab" data-mode="signup">註冊</button>
      </div>
      <div class="auth-form">
        <div class="field"><label>📧 Email</label><input id="authEmail" type="email" placeholder="your@email.com"></div>
        <div class="field"><label>🔒 密碼</label><input id="authPw" type="password" placeholder="至少 6 位"></div>
        <div id="authErr" style="font-size:12px;color:var(--red);margin-bottom:8px;min-height:18px"></div>
        <button class="btn btn-primary" style="width:100%" id="authBtn" onclick="doAuth()">登入</button>

function wizNext(){
  if(wizStep===1){wizData.destination=$('#wDest')?.value?.trim();if(!wizData.destination){alert(T()==='en'?'Please enter a destination':'請輸入目的地');return;}}
  if(wizStep===2){wizData.dateStart=$('#wDs')?.value;wizData.dateEnd=$('#wDe')?.value;if(!wizData.dateStart||!wizData.dateEnd){alert(T()==='en'?'Please select dates':'請選擇日期');return;}}
  if(wizStep===3){wizData.homeCurrency=$('#wCur')?.value||'HKD';}
  if(wizData.mode==='generate'&&wizStep===8){wizData.hotels=wizData.hotels.filter(h=>h.name.trim());}
  wizStep++;renderWizStep();
}
function wizBack(){if(wizStep>0){wizStep--;renderWizStep();}else showDashboard();}

/* ===== GENERATE ===== */
async function wizGenerate(){
  wizData.lang=curLang==='en'?'en':'zh-TW';
  showView('generating');
  const isEn=T()==='en';
  const steps=$('#genSteps');
  const addStep=(txt,done)=>{const d=ce('div','gen-step'+(done?' done':''));d.innerHTML='<span class="gs-icon">'+(done?'✅':'⏳')+'</span>'+txt;steps.appendChild(d);return d;};
  steps.innerHTML='';
  $('.gen-text').textContent=isEn?'Planning your trip...':'正在規劃你的旅程...';
  $('.gen-sub').textContent=isEn?'Searching attractions, restaurants & transport (~30-60s)':'搜尋景點、餐廳、交通資訊中，約需 30-60 秒';
  const s1=addStep((isEn?'Searching ':'搜尋 ')+wizData.destination+(isEn?' attractions & restaurants...':' 景點與餐廳...'));

  try{
    const res=await fetch(EDGE_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({destination:wizData.destination,dateStart:wizData.dateStart,dateEnd:wizData.dateEnd,
        people:wizData.people,hotels:wizData.hotels.filter(h=>h.name),pace:wizData.pace,
        homeCurrency:wizData.homeCurrency,lang:wizData.lang,
        budget:wizData.budget,travelType:wizData.travelType,
        interests:wizData.interests,hasKidsOrElderly:wizData.hasKidsOrElderly})});

    s1.classList.add('done');s1.querySelector('.gs-icon').textContent='✅';
    const s2=addStep(isEn?'Generating itinerary...':'生成行程中...');

    const resBody=await res.json();
    if(!res.ok)throw new Error(resBody.error||'Generation failed');

    s2.classList.add('done');s2.querySelector('.gs-icon').textContent='✅';
    const s3=addStep(isEn?'Saving...':'儲存中...');

    const{data:newTrip,error}=await sb.from('trips').insert({
      owner_id:user.id,
      title:resBody.title||wizData.destination+(isEn?' Trip':' 旅行'),
      destination:wizData.destination,date_start:wizData.dateStart,date_end:wizData.dateEnd,
      people_count:wizData.people,pace:wizData.pace,
      currency:resBody.currency||'JPY',home_currency:wizData.homeCurrency,
      fx_rate:resBody.fxRate||1,hotels:wizData.hotels.filter(h=>h.name),
      itinerary:resBody.days||[],bookmarks:resBody.bookmarks||[],
      todos:resBody.todos||[],
      settings:{phrases:resBody.phrases||[],emergency:resBody.emergencyInfo||{},budget:wizData.budget,travelType:wizData.travelType,interests:wizData.interests},
      lang:wizData.lang
    }).select().single();

    if(error)throw error;
    s3.classList.add('done');s3.querySelector('.gs-icon').textContent='✅';
    addStep(isEn?'Done! Opening...':'完成！正在開啟...',true);
    setTimeout(()=>openTrip(newTrip.id),800);
  }catch(err){
    const msg=err.message||'';
    let hint=isEn?'Possible causes: API Key not set, network issue, or try again.':'可能原因：API Key 未設定、網路問題，或請重試。';
    if(msg.includes('API key'))hint=isEn?'The API key is not configured. Please set ANTHROPIC_API_KEY in Supabase Edge Function secrets.':'API Key 未設定。請在 Supabase Edge Functions → Secrets 設定 ANTHROPIC_API_KEY。';
    if(msg.includes('401'))hint=isEn?'API key is invalid. Please check your Anthropic API key.':'API Key 無效，請檢查你的 Anthropic API Key。';
    $('#generating').innerHTML='<div class="gen-error"><h3>⚠️ '+(isEn?'Generation Failed':'生成失敗')+'</h3><p>'+esc(msg)+'</p><p style="margin-top:8px">'+hint+'</p><div style="display:flex;gap:10px;justify-content:center;margin-top:16px"><button class="btn btn-primary" onclick="wizGenerate()">'+(isEn?'Retry':'重試')+'</button><button class="btn btn-outline" onclick="showDashboard()">'+(isEn?'Back':'返回')+'</button></div></div>';
  }
}

/* ===== DIY TRIP ===== */
async function createDiyTrip(){
  const isEn=T()==='en';
  const ds=new Date(wizData.dateStart),de=new Date(wizData.dateEnd);
  const days=[];const ms=24*60*60*1000;
  for(let d=new Date(ds);d<=de;d=new Date(d.getTime()+ms)){
    const m=d.getMonth()+1,dd=d.getDate();
    const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    days.push({date:m+'/'+dd,dow,city:wizData.destination,tag:isEn?'Day '+(days.length+1):'第'+(days.length+1)+'天',
      transit:'',navStops:[wizData.destination],items:[
        {t:'10:00',type:'coffee',title:isEn?'Breakfast':'早餐',intro:'',rec:null,dir:null,mapQuery:null},
        {t:'12:00',type:'eat',title:isEn?'Lunch':'午餐',intro:'',rec:null,dir:null,mapQuery:null},
        {t:'14:00',type:'see',title:isEn?'Sightseeing':'景點',intro:'',rec:null,dir:null,mapQuery:null},
        {t:'19:00',type:'eat',title:isEn?'Dinner':'晚餐',intro:'',rec:null,dir:null,mapQuery:null}
      ]});
  }
  try{
    const{data:newTrip,error}=await sb.from('trips').insert({
      owner_id:user.id,title:wizData.destination+(isEn?' Trip':' 旅行'),
      destination:wizData.destination,date_start:wizData.dateStart,date_end:wizData.dateEnd,
      people_count:wizData.people,pace:'standard',currency:'',home_currency:wizData.homeCurrency||'HKD',
      fx_rate:1,hotels:[],itinerary:days,bookmarks:[],todos:[],lang:curLang==='en'?'en':'zh-TW'
    }).select().single();
    if(error)throw error;
    openTrip(newTrip.id);
  }catch(err){alert(err.message);}
}

/* ===== OPEN TRIP ===== */
async function openTrip(id){
  const{data,error}=await sb.from('trips').select('*').eq('id',id).single();
  if(error||!data){alert('找不到旅程');showDashboard();return;}
  currentTrip=data;curDay=0;curTab='plan';
  renderTripView();
}

async function loadSharedTrip(token){
  const{data,error}=await sb.from('trips').select('*').eq('share_token',token).single();
  if(error||!data){document.body.innerHTML='<div style="padding:60px;text-align:center"><h2>找不到這個旅程</h2><p style="color:var(--ink2);margin-top:8px">連結可能已失效</p></div>';return;}
  currentTrip=data;user=null;curDay=0;curTab='plan';
  renderTripView();
}

/* ===== SAVE TRIP ===== */
async function saveTrip(fields){
  if(!currentTrip)return;
  Object.assign(currentTrip,fields);
  await sb.from('trips').update(fields).eq('id',currentTrip.id);
}

/* ===== RENDER TRIP VIEW ===== */
function renderTripView(){
  showView('tripview');
  const t=currentTrip;
  $('#tvDest').textContent=(t.destination||'').toUpperCase();
  $('#tvTitle').textContent=t.title;
  const ds=t.date_start?new Date(t.date_start+'T00:00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):'';
  const de=t.date_end?new Date(t.date_end+'T00:00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):'';
  $('#tvMeta').innerHTML='<span>📅 '+ds+'–'+de+'</span><span>👥 '+t.people_count+'人</span><span>💱 '+t.home_currency+'</span>';
  $('#shareUrl').value=window.location.origin+window.location.pathname+'?share='+t.share_token;

  // Tabs
  const tabs=$('#tvTabs');tabs.innerHTML='';
  [['plan','🗓️','行程'],['money','💰','記帳'],['fx','💱','換算'],['save','🔖','收藏'],['todo','✅','待辦'],['info','🪪','資訊']].forEach(([id,ic,l])=>{
    const b=ce('button');b.dataset.tab=id;b.className=id===curTab?'on':'';
    b.innerHTML='<span class="ic">'+ic+'</span>'+l;
    b.onclick=()=>{curTab=id;tabs.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.tab===id));renderTab();};
    tabs.appendChild(b);
  });
  renderTab();
}

function renderTab(){
  const m=$('#tvMain');m.innerHTML='';
  const r={plan:renderPlan,money:renderMoney,fx:renderFx,save:renderBookmarks,todo:renderTodos,info:renderInfoTab};
  (r[curTab]||r.plan)(m);
}

/* ===== PLAN TAB ===== */
function renderPlan(el){
  const days=currentTrip.itinerary||[];if(!days.length){el.innerHTML='<div class="empty">這個旅程還沒有行程。</div>';return;}
  // chips
  const chips=ce('div','chips');
  days.forEach((d,i)=>{const b=ce('button','chip'+(i===curDay?' on':''));b.innerHTML='<div class="d">'+esc(d.date)+'</div><div class="w">（'+esc(d.dow)+'）</div>';b.onclick=()=>{curDay=i;renderTab();};chips.appendChild(b);});
  el.appendChild(chips);
  const d=days[curDay];if(!d)return;
  // dayhead
  el.insertAdjacentHTML('beforeend','<div class="dayhead"><div><div class="k">DAY '+(curDay+1)+' · '+esc(d.date)+'（'+esc(d.dow)+'）</div><div class="c">'+esc(d.city)+'</div></div><span class="tag">'+esc(d.tag)+'</span></div>');
  if(d.transit)el.insertAdjacentHTML('beforeend','<div class="transit">'+esc(d.transit)+'</div>');
  if(d.navStops&&d.navStops.length>1){const a=ce('a','navall');a.href=navUrl(d.navStops,'transit');a.target='_blank';a.textContent='🧭 一鍵導航今日全部景點';el.appendChild(a);}
  // notes
  const nb=ce('div','notebox');nb.innerHTML='<div class="nl">📝 今日備註</div>';
  const ta=ce('textarea');ta.value=(currentTrip.notes||{})[curDay]||'';ta.placeholder='隨手記…';
  let noteTimer;ta.oninput=()=>{clearTimeout(noteTimer);noteTimer=setTimeout(()=>{const n=currentTrip.notes||{};n[curDay]=ta.value;saveTrip({notes:n});},800);};
  nb.appendChild(ta);el.appendChild(nb);
  // items
  const tl=ce('div');tl.style.position='relative';
  (d.items||[]).forEach((it,idx)=>{
    const m=TYPE[it.type]||TYPE.see;const last=idx===(d.items.length-1);
    const wrap=ce('div','item');
    let h='<div class="tcol"><div class="tt">'+esc(it.t)+'</div></div><div class="nodecol"><div class="node" style="background:'+m.c+'">'+m.i+'</div>'+(last?'':'<div class="vline"></div>')+'</div><div class="card"><div class="top"><div class="ti">'+esc(it.title)+'</div><span class="badge" style="color:'+m.c+';border:1px solid '+m.c+'">'+m.l+'</span></div>';
    if(it.intro)h+='<div class="intro">'+esc(it.intro)+'</div>';
    if(it.info){let inf='';it.info.forEach(x=>inf+='<span>'+x[0]+' '+esc(x[1])+'</span>');h+='<div class="info">'+inf+'</div>';}
    if(it.rec){h+='<div class="rec"><div class="rn">🍽️ '+esc(it.rec.name)+(it.rec.rating?' <span class="rstar">★ '+it.rec.rating+'</span>':'')+'</div>';if(it.rec.meta)h+='<div class="rmeta">'+esc(it.rec.meta)+'</div>';
      h+='<a class="recgo" target="_blank" href="'+gmap(it.rec.name)+'">📍 在地圖開啟</a>';
      if(it.rec.alts&&it.rec.alts.length){h+='<div class="alts"><div class="al">其他選擇：</div>';it.rec.alts.forEach(a=>{h+='<a class="altlink" target="_blank" href="'+gmap(a[0])+'">'+esc(a[0])+(a[1]?' <span class="s">★'+a[1]+'</span>':'')+'</a>';});h+='</div>';}
      h+='</div>';}
    let btns='';
    if(it.dir)btns+='<a class="dirbtn" target="_blank" href="'+dirUrl(it.dir[0],it.dir[1],it.dir[2])+'">🧭 導航</a>';
    if(it.mapQuery)btns+='<a class="mapbtn" target="_blank" href="'+gmap(it.mapQuery)+'">📍 地圖</a>';
    if(btns)h+='<div class="btns">'+btns+'</div>';
    h+='</div>';wrap.innerHTML=h;tl.appendChild(wrap);
  });
  el.appendChild(tl);
}

/* ===== MONEY TAB ===== */
function renderMoney(el){
  const t=currentTrip,exp=t.expenses||[],rate=t.fx_rate||1,sym=t.currency==='JPY'?'¥':t.currency||'¥';
  const toHome=j=>j/rate;const tot=exp.reduce((s,e)=>s+e.amt,0);
  el.innerHTML='<div class="hero-box"><div class="lbl">總花費</div><div class="big">'+yen(tot,sym)+'</div><div class="sub">≈ '+t.home_currency+' '+(toHome(tot)).toFixed(0)+'</div></div>';
  // add form
  const panel=ce('div','panel');panel.innerHTML='<h3>➕ 新增一筆</h3><div class="row" style="margin-bottom:10px"><div style="position:relative;flex:1"><span style="position:absolute;left:10px;top:10px;font-family:var(--mono);color:#9AA6AF">'+sym+'</span><input id="mAmt" inputmode="decimal" placeholder="金額" style="padding-left:22px;font-family:var(--mono);font-size:16px"></div></div><div class="catrow" id="mCats"></div><div class="row"><input id="mNote" placeholder="備註（可空）" style="font-size:13px"><button class="addbtn" id="mAddBtn">加入</button></div>';
  el.appendChild(panel);
  // render cats
  const mc=panel.querySelector('#mCats');CATS.forEach(([k,l,col])=>{const b=ce('button','catbtn');b.textContent=l;if(k===curCat){b.style.background=col;b.style.color='#fff';}b.onclick=()=>{curCat=k;renderTab();};mc.appendChild(b);});
  panel.querySelector('#mAddBtn').onclick=async()=>{const v=parseFloat(panel.querySelector('#mAmt').value);if(!v)return;const ex=[...exp,{id:Date.now(),amt:Math.round(v),cat:curCat,note:panel.querySelector('#mNote').value.trim(),day:curDay,ts:new Date().toISOString()}];await saveTrip({expenses:ex});renderTab();};
  // list
  if(!exp.length){el.insertAdjacentHTML('beforeend','<div class="empty">還沒有紀錄。</div>');return;}
  exp.slice().reverse().forEach(e=>{const cat=CATS.find(c=>c[0]===e.cat)||CATS[5];const row=ce('div','exp');row.innerHTML='<span class="dot" style="background:'+cat[2]+'"></span><div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:600">'+cat[1]+(e.note?' <span style="color:#9AA6AF;font-weight:400">· '+esc(e.note)+'</span>':'')+'</div></div><div style="text-align:right"><div style="font-family:var(--mono);font-weight:700;font-size:14px">'+yen(e.amt,sym)+'</div><div style="font-family:var(--mono);font-size:11px;color:var(--gold)">'+t.home_currency+' '+(toHome(e.amt)).toFixed(0)+'</div></div>';const del=ce('button','del');del.textContent='🗑';del.onclick=async()=>{const nx=exp.filter(x=>x.id!==e.id);await saveTrip({expenses:nx});renderTab();};row.appendChild(del);el.appendChild(row);});
}

/* ===== FX TAB ===== */
function renderFx(el){
  const t=currentTrip,rate=t.fx_rate||1,sym=t.currency||'¥',home=t.home_currency||'HKD';
  el.innerHTML='<div class="hero-box"><div class="lbl">輸入金額（'+sym+'）</div><div style="position:relative;margin-top:8px"><span style="position:absolute;left:14px;top:14px;font-family:var(--mono);font-size:22px;font-weight:800;color:rgba(255,255,255,.5)">'+sym+'</span><input id="fxIn" inputmode="decimal" placeholder="0" style="width:100%;padding:12px 14px 12px 40px;font-family:var(--mono);font-size:28px;font-weight:800;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.2);border-radius:12px"></div><div style="text-align:center;margin:10px 0 2px;font-size:20px;color:#9BB4CC">＝</div><div style="text-align:center"><span id="fxOut" style="font-family:var(--mono);font-size:36px;font-weight:800;color:var(--gold)">'+home+' 0</span></div><div style="text-align:center;font-family:var(--mono);font-size:12px;color:#8FA6BC;margin-top:4px">匯率 1 '+home+' = '+rate+' '+t.currency+'</div></div>';
  // quick grid
  el.insertAdjacentHTML('beforeend','<div style="font-weight:700;font-size:13.5px;margin-bottom:8px;color:var(--ink2)">快速對照</div>');
  const g=ce('div','qgrid');[500,1000,2000,3000,5000,10000,15000,30000].forEach(x=>{const c=ce('div','qcell');c.innerHTML='<span class="j">'+sym+x.toLocaleString()+'</span><span class="h">'+home+' '+(x/rate).toFixed(0)+'</span>';g.appendChild(c);});
  el.appendChild(g);
  // rate settings
  el.insertAdjacentHTML('beforeend','<details style="margin-top:16px"><summary style="cursor:pointer;font-size:13px;color:var(--ink2);font-weight:600;padding:8px 0">⚙️ 匯率設定</summary><div class="panel" style="margin-top:8px"><div class="row"><input id="fxRateIn" inputmode="decimal" value="'+rate+'" style="flex:1;font-family:var(--mono)"><button class="addbtn" id="fxUpd" style="background:var(--gold)">更新</button></div></div></details>');
  setTimeout(()=>{
    const inp=$('#fxIn');if(inp)inp.oninput=()=>{const v=parseFloat(inp.value);$('#fxOut').textContent=v>0?home+' '+(v/rate).toFixed(1):home+' 0';};
    const upd=$('#fxUpd');if(upd)upd.onclick=async()=>{const r=parseFloat($('#fxRateIn').value);if(r>0){await saveTrip({fx_rate:r});renderTab();}};
  },0);
}

/* ===== BOOKMARKS TAB ===== */
function renderBookmarks(el){
  const bk=currentTrip.bookmarks||[];
  BK_CATS.forEach(([k,l,ic])=>{
    const items=bk.filter(b=>b.cat===k);if(!items.length)return;
    const box=ce('div','bkcat');box.innerHTML='<div class="bh"><span class="ic">'+ic+'</span>'+l+'（'+items.length+'）</div>';
    items.forEach(b=>{const row=ce('div','bk');row.innerHTML='<div class="nm">'+esc(b.name)+(b.sub?'<small>'+esc(b.sub)+'</small>':'')+'</div><a class="go" target="_blank" href="'+gmap(b.mapQuery||b.name)+'">📍 地圖</a>';box.appendChild(row);});
    el.appendChild(box);
  });
  if(!bk.length)el.innerHTML='<div class="empty">還沒有收藏。</div>';
}

/* ===== TODOS TAB ===== */
function renderTodos(el){
  const todos=currentTrip.todos||[];const done=currentTrip.settings?.todoDone||{};
  const all=todos.flatMap(s=>s.items||[]);const doneCount=all.filter((_,i)=>done[i]).length;
  el.innerHTML='<div class="hero-box"><div style="display:flex;justify-content:space-between;align-items:center"><div class="lbl">準備進度</div><div style="font-family:var(--mono);font-weight:800;font-size:16px">'+doneCount+' / '+all.length+'</div></div><div class="prog"><div style="width:'+(all.length?doneCount/all.length*100:0)+'%"></div></div></div>';
  let globalIdx=0;
  todos.forEach(sec=>{
    const box=ce('div','phase');box.innerHTML='<div class="ph"><span class="ic">📋</span>'+esc(sec.section)+'</div>';
    (sec.items||[]).forEach(item=>{
      const idx=globalIdx++;const on=!!done[idx];
      const row=ce('div','chk'+(on?' on':''));
      const bx=ce('span','box');bx.textContent=on?'✓':'';
      bx.onclick=async()=>{const d={...done};d[idx]=!d[idx];const s={...currentTrip.settings,todoDone:d};await saveTrip({settings:s});renderTab();};
      const lab=ce('span','lab');lab.textContent=item;
      row.appendChild(bx);row.appendChild(lab);box.appendChild(row);
    });
    el.appendChild(box);
  });
}

/* ===== INFO TAB ===== */
function renderInfoTab(el){
  const s=currentTrip.settings||{};
  // Phrases
  const phrases=s.phrases||[];
  if(phrases.length){
    const panel=ce('div','panel');panel.innerHTML='<div style="font-weight:800;font-size:14px;margin-bottom:10px">🗣️ 實用語句</div>';
    phrases.forEach(cat=>{panel.insertAdjacentHTML('beforeend','<div style="font-weight:800;font-size:13px;margin:14px 0 7px;color:var(--ink)">'+esc(cat.cat)+'</div>');
      (cat.items||[]).forEach(([zh,local,rm])=>{const d=ce('div','phrase');d.innerHTML='<div style="flex:1;min-width:0"><span>'+esc(zh)+'</span>'+(rm?'<div style="font-family:var(--mono);font-size:10.5px;color:#9AA6AF;margin-top:2px">'+esc(rm)+'</div>':'')+'</div><span class="jp">'+esc(local)+'</span>';panel.appendChild(d);});
    });
    el.appendChild(panel);
  }
  // Emergency
  const em=s.emergency||{};
  if(em.police||em.ambulance){
    const panel=ce('div','panel');panel.innerHTML='<div style="font-weight:800;font-size:14px;margin-bottom:10px">🆘 緊急資訊</div>';
    if(em.police)panel.insertAdjacentHTML('beforeend','<div class="emc"><b>警察</b> '+esc(em.police)+'</div>');
    if(em.ambulance)panel.insertAdjacentHTML('beforeend','<div class="emc"><b>救護/消防</b> '+esc(em.ambulance)+'</div>');
    if(em.embassy)panel.insertAdjacentHTML('beforeend','<div class="emc"><b>大使館/領事館</b> '+esc(em.embassy)+'</div>');
    if(em.tips)(em.tips).forEach(t=>panel.insertAdjacentHTML('beforeend','<div class="emc">💡 '+esc(t)+'</div>'));
    el.appendChild(panel);
  }
}

function copyShare(){$('#shareUrl').select();navigator.clipboard.writeText($('#shareUrl').value);$('#shareUrl').nextElementSibling.textContent='已複製！';setTimeout(()=>$('#shareUrl').nextElementSibling.textContent='複製連結',2000);}

/* ===== INIT ===== */
try{const sl=localStorage.getItem('tc-lang');if(sl&&LANGS.includes(sl)){curLang=sl;applyLang();}}catch(e){}
let authInProgress=false;
sb.auth.onAuthStateChange((event,session)=>{if(event==='SIGNED_IN'&&session&&!authInProgress){user=session.user;showDashboard();}});
checkAuth();
</script>
